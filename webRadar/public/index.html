<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidHook Radar</title>
    <style>
        body { margin: 0; background: #0b0b0d; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #radar-container { position: relative; width: 800px; height: 800px; border: 2px solid #3d3d4d; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; border: 1px solid #444; }
        .status { color: #8a2be2; font-weight: bold; }
    </style>
</head>
<body>
    <div id="radar-container">
        <div id="info">
            Session: <span id="session-id" class="status">connecting...</span> | 
            Map: <span id="map-name" class="status">unknown</span> | 
            Status: <span id="ws-status" class="status">offline</span>
        </div>
        <canvas id="mapCanvas" width="800" height="800"></canvas>
        <canvas id="radarCanvas" width="800" height="800"></canvas>
    </div>
    <script src="/client.js"></script>
</body>
</html>
